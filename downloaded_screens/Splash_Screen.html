<style>
        body {
            background-color: #1e1b17; /* Override for the dark splash screen experience */
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .grain-texture {
            position: fixed;
            inset: 0;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }

        .candle-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(130, 59, 24, 0.25) 0%, rgba(130, 59, 24, 0) 70%);
            filter: blur(60px);
            animation: flicker 4s infinite alternate ease-in-out;
        }

        @keyframes flicker {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
            100% { opacity: 0.7; transform: scale(0.98); }
        }

        .fade-in {
            animation: fadeIn 2.5s ease-out forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .logo-reveal {
            animation: logoReveal 3s ease-in-out forwards;
        }

        @keyframes logoReveal {
            0% { letter-spacing: 0.1em; opacity: 0; }
            100% { letter-spacing: -0.01em; opacity: 1; }
        }
    </style>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const glows = document.querySelectorAll('.candle-glow');
            const x = (e.clientX / window.innerWidth) * 20;
            const y = (e.clientY / window.innerHeight) * 20;
            
            glows.forEach((glow, index) => {
                const multiplier = index === 0 ? 1 : -1;
                glow.style.transform = `translate(${x * multiplier}px, ${y * multiplier}px)`;
            });
        });

        // Suppression Logic: This is a Splash Screen (Transactional/Linear)
        // No Navigation Shell (TopAppBar or BottomNavBar) is rendered per the "Relevance Check" rule.
    </script>
